# Example configuration. The real watch list is private by nature — copy this file,
# edit it, and point `--config <path>` or the JOB_BOARD_MCP_CONFIG env var at your copy.
#
# The boards below are illustrative; verify each `token` against the board's own
# careers page before relying on it.

# Where the SQLite snapshot store lives. `~` expands at open time.
db_path = "~/.local/share/job-board-mcp/store.sqlite"

# Days of raw request/response captures to keep. Every successful fetch logs its raw
# body, so you can `dump_captures` a real sample and hand it back when an adapter needs
# building or fixing. Each write purges rows past this window. Set 0 to turn capture off.
raw_capture_days = 7

[[board]]
id = "stripe"
ats = "greenhouse"
token = "stripe"
comp_site_only = true          # mostly true: a minority of postings (pay-transparency
                               # jurisdictions) embed a band inline, but the API has no
                               # structured pay field, so the band is Comp::SiteOnly

[[board]]
id = "openai"
ats = "ashby"
token = "openai"

[[board]]
id = "example-on-lever"
ats = "lever"
token = "example"

# Workday is the exception: `token` is the API HOST (from the careers URL) and `site`
# is the career-site id. The tenant is the host's first label.
[[board]]
id = "nvidia"
ats = "workday"
token = "nvidia.wd5.myworkdayjobs.com"
site = "NVIDIAExternalCareerSite"

# SmartRecruiters: `token` is the company identifier. Canonical case is the convention,
# but it resolves case-insensitively. (Visa is only a residual test presence here — their
# real pipeline moved elsewhere; it's an adapter demo, not a "watch Visa hiring" example.)
[[board]]
id = "example-on-smartrecruiters"
ats = "smartrecruiters"
token = "Visa"

[[board]]
id = "rippling"
ats = "rippling"
token = "rippling"          # the board slug in ats.rippling.com/{slug}

# github.careers is GitHub's own board; the token is ignored (there's one board).
[[board]]
id = "github"
ats = "github_careers"
token = "github"

[[board]]
id = "futureplc"
ats = "workable"
token = "futureplc"         # the account slug in apply.workable.com/{slug}
